name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "global.json"
      - "Directory.Packages.props"
      - "**/*.csproj"
      - "**/*.props"
      - "**/*.targets"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "global.json"
      - "Directory.Packages.props"
      - "**/*.csproj"
      - "**/*.props"
      - "**/*.targets"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: dotnet sdk setup
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true

      - run: dotnet restore
